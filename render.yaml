  #     - key: RACK_ENV
  #       value: production

  - type: redis
    name: kakaowy-sklepik-redis
    plan: free
    region: frankfurt
    ipAllowList: []

databases:
  - name: kakaowy-sklepik-db
    plan: free
    region: frankfurt
    databaseName: kakaowy_sklepik
    postgresMajorVersion: "18"
    ipAllowList: []
