services:
  - type: web
    name: kakaowy-sklepik-backend
    runtime: ruby
    plan: starter
    region: frankfurt
    buildCommand: bash bin/render-build.sh
    preDeployCommand: bash bin/render-release.sh
    startCommand: cd server && bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kakaowy-sklepik-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kakaowy-sklepik-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: CDN_HOST
        value: kakaowy-sklepik.onrender.com
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SPREE_PATH
        value: /opt/render/project/src
      - key: RAILS_MASTER_KEY
        sync: false

  - type: worker
    name: kakaowy-sklepik-worker
    runtime: ruby
    plan: standard
    region: frankfurt
    buildCommand: bash bin/render-build.sh
    startCommand: cd server && bundle exec sidekiq
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kakaowy-sklepik-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kakaowy-sklepik-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY_BASE
        fromService:
          name: kakaowy-sklepik-backend
          type: web
          envVarKey: SECRET_KEY_BASE
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: SPREE_PATH
        value: /opt/render/project/src

  - type: redis
    name: kakaowy-sklepik-redis
    plan: free
    region: frankfurt
    ipAllowList: []

databases:
  - name: kakaowy-sklepik-db
    plan: free
    region: frankfurt
    databaseName: kakaowy_sklepik
    postgresMajorVersion: "18"
    ipAllowList: []
