  "/api/v3/admin/stock_locations":
    get:
      summary: List stock locations
      tags:
      - Configuration
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Returns the configured stock locations. Stock locations are global
        (shared across stores). Filter with Ransack predicates such as
        `q[active_eq]`, `q[kind_eq]`, `q[pickup_enabled_eq]`, or
        `q[name_cont]`.

        Pickup-related attributes (`kind`, `pickup_enabled`,
        `pickup_stock_policy`, `pickup_ready_in_minutes`,
        `pickup_instructions`) drive merchant pickup support at checkout —
        customers can collect orders from any active location with
        `pickup_enabled: true`.


        **Required scope:** `read_settings` (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          const { data: stockLocations } = await client.stockLocations.list()
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Number of records per page
        schema:
          type: integer
      - name: q[name_cont]
        in: query
        required: false
        description: Filter by name (contains)
        schema:
          type: string
      - name: q[active_eq]
        in: query
        required: false
        description: Filter by active status
        schema:
          type: boolean
      - name: q[kind_eq]
        in: query
        required: false
        description: 'Filter by kind (built-in: ''warehouse'', ''store'', ''fulfillment_center'')'
        schema:
          type: string
      - name: q[pickup_enabled_eq]
        in: query
        required: false
        description: Filter by pickup-enabled flag
        schema:
          type: boolean
      - name: sort
        in: query
        required: false
        description: Sort by field. Prefix with `-` for descending (e.g., `-created_at`).
        schema:
          type: string
      - name: fields
