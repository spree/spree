        Queues a CSV export. The `type` selects the dataset; `search_params` is an
        optional Ransack query (same shape used by the `q[...]` params on list endpoints)
        that filters which records are exported. Pass `record_selection: "all"` to
        clear the filter server-side and export everything in scope.

        Generation is asynchronous. Poll `GET /admin/exports/{id}` until `done` is `true`,
        then redirect the browser to `download_url` to fetch the file.


        **Required scope:** the read scope of the exported resource — `read_products` for product exports, `read_customers` for customer exports, etc. (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          const exp = await client.exports.create({
            type: 'Spree::Exports::Products',
            search_params: { name_cont: 'shirt' }
          })
      - lang: bash
        label: Spree CLI
        source: spree api post /exports -d '{"type":"Spree::Exports::Products","search_params":{"name_cont":"shirt"}}'
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: export queued
          content:
            application/json:
              example:
                id: exp_gbHJdmfrXB
                number: EF169524065
                type: Spree::Exports::Products
                format: csv
                created_at: '2026-07-11T15:37:28.677Z'
                updated_at: '2026-07-11T15:37:28.677Z'
                user_id: admin_UkLWZg9DAJ
                done: false
                filename:
                byte_size:
                download_url:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - Spree::Exports::Products
                  - Spree::Exports::Orders
                  - Spree::Exports::Customers
                  - Spree::Exports::ProductTranslations
                  - Spree::Exports::GiftCards
                  - Spree::Exports::CouponCodes
                  - Spree::Exports::NewsletterSubscribers
                  example: Spree::Exports::Products
                record_selection:
                  type: string
                  enum:
                  - filtered
                  - all
                  description: Set to "all" to ignore search_params and export everything
                    in scope.
                  example: filtered
                search_params:
                  type: object
                  description: Ransack query hash. Same predicates accepted by the
                    list endpoint.
                  example:
                    name_cont: shirt
                  additionalProperties: true
                results_url:
                  type: string
                  description: Absolute URL of your admin exports view; the export-done
                    email uses it as the download button target. Only honored when
                    it matches one of the store's configured allowed origins.
                  example: https://admin.example.com/store_abc/exports
