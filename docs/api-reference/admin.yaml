            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          await client.adminUsers.delete('admin_xxx')
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: staff removed from store
