                code_prefix:
                promotion_category_id:
                metadata: {}
                created_at: '2026-05-12T15:42:04.320Z'
                updated_at: '2026-05-12T15:42:04.602Z'
                store_ids:
                - store_UkLWZg9DAJ
                action_ids: []
