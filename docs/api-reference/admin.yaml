      description: |-
        Creates a new product. Supports nested variants with prices and option types.

        Option types and values are auto-created if they don't exist.
        Prices are upserted by currency. Stock items are upserted by stock location.


        **Required scope:** `write_products` (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          const product = await client.products.create({
            name: 'Premium T-Shirt',
            description: 'Soft, organic cotton.',
            status: 'active',
            variants: [
              {
                sku: 'TSHIRT-S-NAVY',
                options: [
                  { name: 'size', value: 'Small' },
                  { name: 'color', value: 'navy' },
                ],
                prices: [
                  { currency: 'USD', amount: '29.99' },
                  { currency: 'EUR', amount: '27.99' },
                ],
                stock_items: [{ stock_location_id: 'sloc_UkLWZg9DAJ', count_on_hand: 50 }],
              },
              {
                sku: 'TSHIRT-M-NAVY',
                options: [
                  { name: 'size', value: 'Medium' },
                  { name: 'color', value: 'navy' },
                ],
                prices: [{ currency: 'USD', amount: '29.99' }],
                stock_items: [{ stock_location_id: 'sloc_UkLWZg9DAJ', count_on_hand: 30 }],
              },
            ],
          })
      - lang: bash
        label: Spree CLI
        source: spree api post /products -d '{"name":"Premium T-Shirt","description":"Soft,
          organic cotton.","status":"active","variants":[{"sku":"TSHIRT-S-NAVY","options":[{"name":"size","value":"Small"},{"name":"color","value":"navy"}],"prices":[{"currency":"USD","amount":"29.99"},{"currency":"EUR","amount":"27.99"}],"stock_items":[{"stock_location_id":"sloc_UkLWZg9DAJ","count_on_hand":50}]},{"sku":"TSHIRT-M-NAVY","options":[{"name":"size","value":"Medium"},{"name":"color","value":"navy"}],"prices":[{"currency":"USD","amount":"29.99"}],"stock_items":[{"stock_location_id":"sloc_UkLWZg9DAJ","count_on_hand":30}]}]}'
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      responses:
        '201':
          description: product created
          content:
            application/json:
              example:
                id: prod_gbHJdmfrXB
                name: New Product
                slug: new-product
                meta_title:
                meta_description:
                meta_keywords:
                variant_count: 0
                available_on:
                preorder_ships_at:
                purchasable: false
                preorder: false
                in_stock: false
                backorderable: false
                available: false
                description:
                description_html:
                default_variant_id: variant_gbHJdmfrXB
                thumbnail_url:
                tags: []
                price:
                original_price:
                status: draft
                metadata: {}
                deleted_at:
                created_at: '2026-07-11T15:38:23.223Z'
                updated_at: '2026-07-11T15:38:23.225Z'
                tax_category_id:
              schema:
                "$ref": "#/components/schemas/Product"
        '422':
          description: validation error
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: Name can't be blank
                  details:
                    name:
                    - can't be blank
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Premium T-Shirt
                description:
                  type: string
                slug:
                  type: string
                status:
                  type: string
                  enum:
                  - draft
                  - active
                  - archived
                tax_category_id:
                  type: string
                  description: Tax category ID
                category_ids:
                  type: array
                  items:
                    type: string
                  description: Array of category IDs
                tags:
                  type: array
                  items:
                    type: string
                  example:
                  - eco
                  - sale
                prices:
                  type: array
                  description: 'Shorthand for a simple (no-options) product: per-currency
                    prices that forward to the product''s sole variant. For products
                    with options, set prices per variant under `variants:` instead.'
                  items:
                    type: object
                    required:
                    - currency
                    - amount
                    properties:
                      currency:
                        type: string
                        example: USD
                      amount:
                        type: string
                        example: '29.99'
                      compare_at_amount:
                        type: string
                        nullable: true
                        example: '39.99'
                variants:
                  type: array
                  description: Array of variant payloads. Variants can declare multiple
                    option pairs via `options:` and per-currency prices via `prices:`.
                    Stock counts go in `stock_items:` (per stock location).
                  items:
                    type: object
                    properties:
                      sku:
                        type: string
                      options:
                        type: array
                        description: One pair per option type the variant participates
                          in (e.g. size + color). Option types and values are auto-created
                          if missing.
                        items:
                          type: object
                          required:
                          - name
                          - value
                          properties:
                            name:
                              type: string
                              example: size
                            value:
                              type: string
                              example: Small
                      prices:
                        type: array
                        description: Per-currency prices. Upserted by currency.
                        items:
                          type: object
                          required:
                          - currency
                          - amount
                          properties:
                            currency:
                              type: string
                              example: USD
                            amount:
                              type: string
                              example: '29.99'
                            compare_at_amount:
                              type: string
                              nullable: true
                              example: '39.99'
                      stock_items:
                        type: array
                        description: Per-stock-location inventory. Upserted by stock_location_id.
                        items:
                          type: object
                          required:
                          - stock_location_id
                          - count_on_hand
                          properties:
                            stock_location_id:
                              type: string
                              description: Stock location ID (e.g. sloc_xxx)
                            count_on_hand:
                              type: integer
                              example: 50
                            backorderable:
                              type: boolean
              required:
              - name
