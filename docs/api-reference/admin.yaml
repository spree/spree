  "/api/v3/admin/tags":
    get:
      summary: List tags
      tags:
      - Settings
      security:
      - api_key: []
        bearer_auth: []
      description: Returns tag names for a given taggable type. Used for autocomplete
        in tag inputs on products, orders, and customers.
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          const { data: tags } = await client.tags.list({
            taggable_type: 'Spree::User',
            q: 'vip',
          })
      - lang: bash
        label: Spree CLI
        source: spree api get /tags -d '{"taggable_type":"Spree::User","q":"vip"}'
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: taggable_type
        in: query
        required: true
        description: Taggable type (`Spree::Product`, `Spree::Order`, or `Spree::User`)
        schema:
          type: string
      - name: q
        in: query
        required: false
        description: Optional case-insensitive substring filter
        schema:
          type: string
      responses:
        '200':
          description: tags found
          content:
            application/json:
              example:
                data:
                - name: vip
                - name: wholesale
        '422':
          description: invalid taggable type
          content:
            application/json:
              example:
                error:
                  code: invalid_taggable_type
                  message: taggable_type must be one of Spree::Product, Spree::Order,
                    Spree::LegacyUser
  "/api/v3/admin/translatable_resources":
    get:
      summary: List translatable resources
      tags:
      - Settings
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Returns every translatable resource type and its translatable fields (key + content type), so clients can render translation editors generically.

        **Required scope:** `read_settings` (for API-key authentication).
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: translatable resources found
          content:
            application/json:
              example:
                data:
                - resource_type: option_type
                  fields:
                  - key: label
                    type: string
                  readable: true
                - resource_type: option_value
                  fields:
                  - key: label
                    type: string
                  readable: false
                - resource_type: product
                  fields:
                  - key: name
                    type: string
                  - key: description
                    type: html
                  - key: slug
                    type: string
                  - key: meta_description
                    type: string
                  - key: meta_title
                    type: string
                  readable: true
                - resource_type: category
                  fields:
                  - key: name
                    type: string
                  - key: pretty_name
                    type: string
                  - key: description
                    type: html
                  - key: permalink
                    type: string
                  readable: true
                - resource_type: taxonomy
                  fields:
                  - key: name
                    type: string
                  readable: false
                - resource_type: store
                  fields:
                  - key: name
                    type: string
                  - key: meta_description
                    type: string
                  - key: meta_keywords
                    type: string
                  - key: seo_title
                    type: string
                  - key: customer_support_email
                    type: string
                  - key: address
                    type: string
                  - key: contact_phone
                    type: string
                  readable: false
                - resource_type: policy
                  fields:
                  - key: name
                    type: string
                  - key: body
                    type: html
                  readable: false
  "/api/v3/admin/translations/batch":
    post:
      summary: Batch upsert translations
      tags:
      - Settings
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Atomically upserts translations across many records of (possibly) different translatable resource types in one request — e.g. an option type and all its option values in one save. A flat list of independent registry writes; all entries succeed or none do.

        **Required scope:** `write_<resource>` for every resource type in the batch (for API-key authentication) (for API-key authentication).
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: translations upserted
          content:
            application/json:
              example:
                data:
                - resource_id: opt_UkLWZg9DAJ
                  resource_type: option_type
                  translations:
                    de:
                      label: Größe
                      translated_field_count: 1
                    fr:
                      label:
                      translated_field_count: 0
                  default_locale: en
                  supported_locales:
                  - de
                  - en
                  - fr
                - resource_id: optval_UkLWZg9DAJ
                  resource_type: option_value
                  translations:
                    de:
                      label: Klein
                      translated_field_count: 1
                    fr:
                      label:
                      translated_field_count: 0
                  default_locale: en
                  supported_locales:
                  - de
                  - en
                  - fr
        '422':
          description: unsupported locale rolls back the whole batch
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: 'Unsupported locale(s): es'
                  details:
                    translations:
                      '0':
                      - 'Unsupported locale(s): es'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - translations
              properties:
                translations:
                  type: array
                  items:
                    type: object
                    required:
                    - resource_type
                    - resource_id
                    - values
                    properties:
                      resource_type:
                        type: string
                        description: Translatable resource type token, e.g. `option_type`
                      resource_id:
                        type: string
                        description: Prefixed id of the record
                      values:
                        type: object
                        description: 'Map of locale code to { field: value }'
                        additionalProperties:
                          type: object
                          additionalProperties: true
