      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: staff member updated
          content:
            application/json:
              example:
                id: admin_UkLWZg9DAJ
                email: treva.welch@cartwright.info
                first_name: Renamed
                last_name: Corkery
                full_name: Renamed Corkery
                created_at: '2026-05-26T15:16:41.761Z'
                updated_at: '2026-05-26T15:16:41.777Z'
                roles:
                - id: role_UkLWZg9DAJ
                  name: admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  example: Ada
                last_name:
                  type: string
                  example: Lovelace
                role_ids:
                  type: array
                  items:
                    type: string
    delete:
      summary: Remove a staff member from this store
      tags:
      - Configuration
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Removes the user's role assignments on the current store. The account is preserved — the user keeps access to any other stores.

        **Required scope:** `write_settings` (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
