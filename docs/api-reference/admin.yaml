                multi_codes: false
                number_of_codes:
                code_prefix:
                promotion_category_id:
                metadata: {}
                created_at: '2026-05-26T15:18:07.273Z'
                updated_at: '2026-05-26T15:18:07.551Z'
                store_ids:
                - store_UkLWZg9DAJ
                action_ids: []
                rule_ids: []
      requestBody:
