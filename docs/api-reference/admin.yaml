                updated_at: '2026-05-12T15:41:21.806Z'
                user_id: admin_UkLWZg9DAJ
                done: false
                filename:
                byte_size:
                download_url:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - Spree::Exports::Products
                  - Spree::Exports::Orders
                  - Spree::Exports::Customers
                  - Spree::Exports::ProductTranslations
                  - Spree::Exports::GiftCards
                  - Spree::Exports::CouponCodes
                  - Spree::Exports::NewsletterSubscribers
                  example: Spree::Exports::Products
                record_selection:
                  type: string
                  enum:
                  - filtered
                  - all
                  description: Set to "all" to ignore search_params and export everything
                    in scope.
                  example: filtered
                search_params:
                  type: object
                  description: Ransack query hash. Same predicates accepted by the
                    list endpoint.
                  example:
                    name_cont: shirt
                  additionalProperties: true
