      - Pricing
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Creates a new draft price list.

        **Required scope:** `write_products` (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          // Server-to-server one-shot create. Ship the rules that gate the list
          // and the exact per-variant prices in a single request — variants in
          // `prices` implicitly become part of the list (upserted on the unique
          // key `(variant_id, currency, price_list_id)`), so there's no need to
          // pre-declare `product_ids` separately.
          const priceList = await client.priceLists.create({
            name: 'EU wholesale',
            description: 'Tiered pricing for verified B2B customers',
            match_policy: 'all',
            starts_at: '2026-06-01T00:00:00Z',
            ends_at: '2026-09-01T00:00:00Z',
            rules: [
              {
                type: 'customer_group_rule',
                preferences: { customer_group_ids: ['cg_aBc123'] },
              },
              {
                type: 'volume_rule',
                preferences: { min_quantity: 10 },
              },
            ],
            prices: [
              {
                variant_id: 'variant_xY9',
                currency: 'USD',
                amount: '19.99',
                compare_at_amount: '24.99',
              },
              {
                variant_id: 'variant_aB7',
                currency: 'USD',
                amount: '21.99',
              },
            ],
          })
      - lang: bash
        label: Spree CLI
        source: spree api post /price_lists -d '{"name":"EU wholesale","description":"Tiered
          pricing for verified B2B customers","match_policy":"all","starts_at":"2026-06-01T00:00:00Z","ends_at":"2026-09-01T00:00:00Z","rules":[{"type":"customer_group_rule","preferences":{"customer_group_ids":["cg_aBc123"]}},{"type":"volume_rule","preferences":{"min_quantity":10}}],"prices":[{"variant_id":"variant_xY9","currency":"USD","amount":"19.99","compare_at_amount":"24.99"},{"variant_id":"variant_aB7","currency":"USD","amount":"21.99"}]}'
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: price list created (server-to-server — rules + prices, no product_ids)
          content:
            application/json:
              example:
                id: pl_EfhxLZ9ck8
                name: EU wholesale
                description:
                status: draft
                position: 3
                match_policy: all
                starts_at:
                ends_at:
                deleted_at:
                created_at: '2026-07-11T15:38:13.954Z'
                updated_at: '2026-07-11T15:38:13.958Z'
                currently_active: false
                products_count: 1
                prices_count: 2
                product_ids:
                - prod_UkLWZg9DAJ
              schema:
                "$ref": "#/components/schemas/PriceList"
        '422':
          description: validation error
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: Name can't be blank
                  details:
                    name:
                    - can't be blank
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  example: EU wholesale
                description:
                  type: string
                  nullable: true
                starts_at:
                  type: string
                  nullable: true
                  example: '2026-06-01T00:00:00Z'
                ends_at:
                  type: string
                  nullable: true
                  example: '2026-09-01T00:00:00Z'
                match_policy:
                  type: string
                  enum:
                  - all
                  - any
                  example: all
                position:
                  type: integer
                  example: 1
                product_ids:
                  type: array
                  items:
                    type: string
                  description: Prefixed product ids to seed the list with.
                  example:
                  - prod_aBc123
                rules:
                  type: array
                  description: STI-typed price rules to attach on create. Existing
                    rules on the same payload via PATCH reconcile by id.
                  items:
                    type: object
                    required:
                    - type
                    properties:
                      type:
                        type: string
                        example: volume_rule
                      preferences:
                        type: object
                        additionalProperties: true
                prices:
                  type: array
                  description: 'Server-to-server alternative to `product_ids`: ship
                    the exact per-variant prices the list should contain. Each row
                    upserts on the unique key `(variant_id, currency, price_list_id)`.
                    Mix-and-match with `product_ids` is supported but typically unnecessary
                    — `prices` alone tells the server which variants belong to the
                    list and what the override amount is.'
                  items:
                    type: object
                    required:
                    - variant_id
                    - currency
                    properties:
                      variant_id:
                        type: string
                        example: variant_xY9
                      currency:
                        type: string
                        example: USD
                      amount:
                        type: string
                        nullable: true
                        example: '19.99'
                      compare_at_amount:
                        type: string
                        nullable: true
                        example: '24.99'
