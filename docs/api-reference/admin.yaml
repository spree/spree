                rule_ids: []
    patch:
      summary: Update a promotion
      tags:
      - Promotions
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Updates a promotion. The `rules` and `actions` arrays are treated as
        a *desired set* — rows with `id` update in place, rows without `id` are
        built fresh, and any existing row not present in the array is destroyed.
        Pass `rules: []` or `actions: []` to clear them.


        **Required scope:** `write_promotions` (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          // Basic field update
          await client.promotions.update(promotionId, {
            description: 'Updated description',
          })

          // One-shot: rewrite rules + actions in a single request
          await client.promotions.update(promotionId, {
            name: 'Holiday Sale',
            rules: [
              // Update an existing rule by id — `preferences` overwrite the prior set
              {
                id: 'prorule_existing',
                type: 'currency',
                preferences: { currency: 'EUR' },
              },
              // Add a new rule
              {
                type: 'item_total',
                preferences: { amount_min: 50, operator_min: 'gte' },
              },
            ],
            actions: [
              // Swap calculator type on an existing action
              {
                id: 'proaction_existing',
                type: 'create_item_adjustments',
                calculator: {
                  type: 'percent_on_line_item',
                  preferences: { percent: 15 },
                },
              },
            ],
          })

          // Remove all rules/actions
          await client.promotions.update(promotionId, {
            rules: [],
            actions: [],
          })
      - lang: bash
        label: Spree CLI
        source: spree api patch /promotions/{id} -d '{"description":"Updated description"}'
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: rules and actions cleared with empty arrays
          content:
            application/json:
              example:
                id: promo_UkLWZg9DAJ
                name: Summer Sale
                description:
                code: summer
                starts_at: '2026-07-11T15:38:33.440Z'
                expires_at:
                usage_limit:
                match_policy: all
                path:
                kind: coupon_code
                multi_codes: false
                number_of_codes:
                code_prefix:
                promotion_category_id:
                metadata: {}
                created_at: '2026-07-11T15:38:33.441Z'
                updated_at: '2026-07-11T15:38:33.732Z'
                action_ids: []
                rule_ids: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                code:
                  type: string
                  nullable: true
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                usage_limit:
                  type: integer
                  nullable: true
                match_policy:
                  type: string
                  enum:
                  - all
                  - any
                kind:
                  type: string
                  enum:
                  - coupon_code
                  - automatic
                promotion_category_id:
                  type: string
                  nullable: true
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        nullable: true
                        description: Pass to update an existing rule; omit to build
                          a new one
                      type:
                        type: string
                        example: currency
                      preferences:
                        type: object
                        additionalProperties: true
                      product_ids:
                        type: array
                        items:
                          type: string
                      category_ids:
                        type: array
                        items:
                          type: string
                      customer_ids:
                        type: array
                        items:
                          type: string
                    required:
                    - type
                actions:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        nullable: true
                      type:
                        type: string
                        example: free_shipping
                      preferences:
                        type: object
                        additionalProperties: true
                      calculator:
                        type: object
                        properties:
                          type:
                            type: string
                            example: flat_percent_item_total
                          preferences:
                            type: object
                            additionalProperties: true
                    required:
                    - type
