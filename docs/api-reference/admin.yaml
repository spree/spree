                  created_at: '2026-05-26T15:16:42.211Z'
                  updated_at: '2026-05-26T15:16:42.211Z'
                  revoked_at:
                  last_used_at:
                  plaintext_token: pk_TAXzVgPEbRY5rWt79znVk5Gm
                  created_by_email:
                - id: key_gbHJdmfrXB
