---
openapi: 3.0.3
info:
  title: Admin API
  contact:
    name: Spree Commerce
    url: https://spreecommerce.org
    email: hello@spreecommerce.org
  description: |
    Spree Admin API v3 - Administrative API for managing products, orders, and store settings.

    ## Authentication

    The Admin API requires a secret API key passed in the `x-spree-api-key` header.
    Secret API keys can be generated in the Spree admin dashboard.

    ## Response Format

    All responses are JSON. List endpoints return paginated responses with `data` and `meta` keys.
    Single resource endpoints return a flat JSON object.

    ## Prefixed IDs

    All resources use Stripe-style prefixed IDs (e.g., `prod_86Rf07xd4z`, `variant_k5nR8xLq`).
    These IDs must be used in all API requests.

    ## Error Handling

    Errors return a consistent format:
    ```json
    {
      "error": {
        "code": "validation_error",
        "message": "Validation failed",
        "details": { "name": ["can't be blank"] }
      }
    }
    ```
  version: v3
paths:
  "/api/v3/admin/products/{product_id}/assets":
    get:
      summary: List product assets
      tags:
      - Assets
      security:
      - api_key: []
        bearer_auth: []
      description: Returns a paginated list of assets (images) for a product.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Number of records per page
        schema:
          type: integer
      responses:
        '200':
          description: assets found
          content:
            application/json:
              example:
                data:
                - id: asset_UkLWZg9DAJ
                  viewable_id: variant_UkLWZg9DAJ
                  type:
                  viewable_type: Spree::Variant
                  position: 1
                  alt:
                  created_at: '2026-03-06T19:36:27.564Z'
                  updated_at: '2026-03-06T19:36:27.571Z'
                meta:
                  page: 1
                  limit: 25
                  count: 1
                  pages: 1
                  from: 1
                  to: 1
                  in: 1
                  previous:
                  next:
    post:
      summary: Create an asset
      tags:
      - Assets
      security:
      - api_key: []
        bearer_auth: []
      description: Creates a new asset (image) for a product.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      responses:
        '422':
          description: validation error (attachment required)
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: Attachment can't be blank
                  details:
                    attachment:
                    - can't be blank
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alt:
                  type: string
                  example: Product front view
                position:
                  type: integer
                  example: 1
                type:
                  type: string
                  example: Spree::Image
                  description: Asset type (defaults to Spree::Image)
                viewable_type:
                  type: string
                  description: Polymorphic viewable type
                viewable_id:
                  type: string
                  description: Polymorphic viewable ID
  "/api/v3/admin/products/{product_id}/assets/{id}":
    patch:
      summary: Update an asset
      tags:
      - Assets
      security:
      - api_key: []
        bearer_auth: []
      description: Updates an asset. Only provided fields are updated.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      - name: id
        in: path
        required: true
        description: Asset prefixed ID
        schema:
          type: string
      responses:
        '200':
          description: asset updated
          content:
            application/json:
              example:
                id: asset_UkLWZg9DAJ
                viewable_id: variant_UkLWZg9DAJ
                type:
                viewable_type: Spree::Variant
                position: 1
                alt: Updated alt text
                created_at: '2026-03-06T19:36:28.322Z'
                updated_at: '2026-03-06T19:36:28.611Z'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alt:
                  type: string
                  example: Updated alt text
                position:
                  type: integer
                  example: 2
    delete:
      summary: Delete an asset
      tags:
      - Assets
      security:
      - api_key: []
        bearer_auth: []
      description: Deletes an asset from a product.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      - name: id
        in: path
        required: true
        description: Asset prefixed ID
        schema:
          type: string
      responses:
        '204':
          description: asset deleted
  "/api/v3/admin/option_types":
    get:
      summary: List option types
      tags:
      - Option Types
      security:
      - api_key: []
        bearer_auth: []
      description: Returns a paginated list of option types.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Number of records per page
        schema:
          type: integer
      - name: q[name_cont]
        in: query
        required: false
        description: Filter by name (contains)
        schema:
          type: string
      responses:
        '200':
          description: option types found
          content:
            application/json:
              example:
                data:
                - id: opt_UkLWZg9DAJ
                  name: foo-size-1
                  presentation: Size
                  position: 1
                  filterable: true
                  option_values: []
                meta:
                  page: 1
                  limit: 25
                  count: 1
                  pages: 1
                  from: 1
                  to: 1
                  in: 1
                  previous:
                  next:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/AdminOptionType"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
                required:
                - data
                - meta
        '401':
          description: unauthorized
          content:
            application/json:
              example:
                error:
                  code: invalid_token
                  message: Valid secret API key required
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    post:
      summary: Create an option type
      tags:
      - Option Types
      security:
      - api_key: []
        bearer_auth: []
      description: |
        Creates a new option type. Supports nested option values.

        Option values can be provided inline and will be created or updated by name.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      responses:
        '201':
          description: option type created
          content:
            application/json:
              example:
                id: opt_gbHJdmfrXB
                name: material
                presentation: Material
                position: 2
                filterable: true
                option_values: []
              schema:
                "$ref": "#/components/schemas/AdminOptionType"
        '422':
          description: validation error
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: Name can't be blank and Presentation can't be blank
                  details:
                    name:
                    - can't be blank
                    presentation:
                    - can't be blank
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: color
                presentation:
                  type: string
                  example: Color
                position:
                  type: integer
                  example: 1
                filterable:
                  type: boolean
                  example: true
                option_values:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: red
                      presentation:
                        type: string
                        example: Red
                      position:
                        type: integer
              required:
              - name
              - presentation
  "/api/v3/admin/option_types/{id}":
    get:
      summary: Get an option type
      tags:
      - Option Types
      security:
      - api_key: []
        bearer_auth: []
      description: Returns a single option type by prefixed ID, including its option
        values.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
