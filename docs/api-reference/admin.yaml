    post:
      summary: Create a promotion
      tags:
      - Promotions
      security:
      - api_key: []
        bearer_auth: []
      description: |-
        Creates a new promotion. `code` is required for single-code coupon promotions;
        pass `multi_codes: true` with `number_of_codes` to auto-generate a batch.

        Rules and actions can be created in the same request by passing arrays of
        `{ type, preferences, ... }` rows. The server reconciles to the desired set:
        new rows are built, existing rows (by `id`) are updated, omitted rows are removed.


        **Required scope:** `write_promotions` (for API-key authentication).
      x-codeSamples:
      - lang: javascript
        label: Spree Admin SDK
        source: |-
          import { createAdminClient } from '@spree/admin-sdk'

          const client = createAdminClient({
            baseUrl: 'https://your-store.com',
            secretKey: 'sk_xxx',
          })

          // Single coupon code, no rules/actions
          const promotion = await client.promotions.create({
            name: 'Black Friday',
            code: 'BLACKFRIDAY',
            starts_at: '2026-11-29T00:00:00Z',
            expires_at: '2026-12-01T00:00:00Z',
          })

          // One-shot: promotion + rules + actions in a single request
          const blackFriday = await client.promotions.create({
            name: 'Black Friday',
            code: 'BLACKFRIDAY',
            kind: 'coupon_code',
            starts_at: '2026-11-29T00:00:00Z',
            expires_at: '2026-12-01T00:00:00Z',
            match_policy: 'all',
            rules: [
              {
                type: 'currency',
                preferences: { currency: 'USD' },
              },
              {
                type: 'item_total',
                preferences: { amount_min: 100, operator_min: 'gte' },
              },
              {
                type: 'product',
                preferences: { match_policy: 'any' },
                product_ids: ['prod_abc123', 'prod_def456'],
              },
            ],
            actions: [
              {
                type: 'create_item_adjustments',
                calculator: {
                  type: 'percent_on_line_item',
                  preferences: { percent: 25 },
                },
              },
              { type: 'free_shipping' },
            ],
          })
      - lang: bash
        label: Spree CLI
        source: spree api post /promotions -d '{"name":"Black Friday","code":"BLACKFRIDAY","starts_at":"2026-11-29T00:00:00Z","expires_at":"2026-12-01T00:00:00Z"}'
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: promotion created with rules and actions
          content:
            application/json:
              example:
                id: promo_gbHJdmfrXB
                name: Black Friday
                description:
                code: blackfriday-os
                starts_at: '2026-07-11T15:38:32.231Z'
                expires_at:
                usage_limit:
                match_policy: all
                path:
                kind: coupon_code
                multi_codes: false
                number_of_codes:
                code_prefix:
                promotion_category_id:
                metadata: {}
                created_at: '2026-07-11T15:38:32.231Z'
                updated_at: '2026-07-11T15:38:32.251Z'
                action_ids:
                - pact_UkLWZg9DAJ
                - pact_gbHJdmfrXB
                rule_ids:
                - prorule_UkLWZg9DAJ
                - prorule_gbHJdmfrXB
                - prorule_EfhxLZ9ck8
        '422':
          description: invalid params
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: Name can't be blank and Code can't be blank
                  details:
                    name:
                    - can't be blank
                    code:
                    - can't be blank
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                  nullable: true
                description:
                  type: string
                  nullable: true
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                usage_limit:
                  type: integer
                  nullable: true
                match_policy:
                  type: string
                  enum:
                  - all
                  - any
                kind:
                  type: string
                  enum:
                  - coupon_code
                  - automatic
                multi_codes:
                  type: boolean
                number_of_codes:
                  type: integer
                  nullable: true
                code_prefix:
                  type: string
                  nullable: true
                promotion_category_id:
                  type: string
                  nullable: true
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        example: currency
                      preferences:
                        type: object
                        additionalProperties: true
                      product_ids:
                        type: array
                        items:
                          type: string
                      category_ids:
                        type: array
                        items:
                          type: string
                      customer_ids:
                        type: array
                        items:
                          type: string
                    required:
                    - type
