---
openapi: 3.0.3
info:
  title: Admin API
  contact:
    name: Spree Commerce
    url: https://spreecommerce.org
    email: hello@spreecommerce.org
  description: |
    Spree Admin API v3 - Administrative API for managing products, orders, and store settings.

    ## Authentication

    The Admin API requires a secret API key passed in the `x-spree-api-key` header.
    Secret API keys can be generated in the Spree admin dashboard.

    ## Response Format

    All responses are JSON. List endpoints return paginated responses with `data` and `meta` keys.
    Single resource endpoints return a flat JSON object.

    ## Prefixed IDs

    All resources use Stripe-style prefixed IDs (e.g., `prod_86Rf07xd4z`, `variant_k5nR8xLq`).
    These IDs must be used in all API requests.

    ## Error Handling

    Errors return a consistent format:
    ```json
    {
      "error": {
        "code": "validation_error",
        "message": "Validation failed",
        "details": { "name": ["can't be blank"] }
      }
    }
    ```
  version: v3
paths:
  "/api/v3/admin/products/{product_id}/assets":
    get:
      summary: List product assets
      tags:
      - Assets
      security:
      - api_key: []
        bearer_auth: []
      description: Returns a paginated list of assets (images) for a product.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: Number of records per page
        schema:
          type: integer
      responses:
        '200':
          description: assets found
          content:
            application/json:
              example:
                data:
                - id: asset_UkLWZg9DAJ
                  viewable_id: variant_UkLWZg9DAJ
                  type:
                  viewable_type: Spree::Variant
                  position: 1
                  alt:
                  created_at: '2026-03-06T19:22:55.186Z'
                  updated_at: '2026-03-06T19:22:55.193Z'
                meta:
                  page: 1
                  limit: 25
                  count: 1
                  pages: 1
                  from: 1
                  to: 1
                  in: 1
                  previous:
                  next:
    post:
      summary: Create an asset
      tags:
      - Assets
      security:
      - api_key: []
        bearer_auth: []
      description: Creates a new asset (image) for a product.
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token for admin authentication
        schema:
          type: string
      - name: product_id
        in: path
        required: true
        description: Product prefixed ID
        schema:
          type: string
      responses:
        '422':
          description: validation error (attachment required)
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: Attachment can't be blank
                  details:
                    attachment:
                    - can't be blank
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alt:
                  type: string
                  example: Product front view
                position:
                  type: integer
                  example: 1
                type:
                  type: string
                  example: Spree::Image
                  description: Asset type (defaults to Spree::Image)
                viewable_type:
                  type: string
                  description: Polymorphic viewable type
                viewable_id:
                  type: string
                  description: Polymorphic viewable ID
