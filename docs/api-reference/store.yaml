  "/api/v3/store/cart":
    post:
      summary: Create a new cart
      tags:
      - Cart
      security:
      - api_key: []
      description: |
        Creates a new shopping cart (order). Can be created by guests or authenticated customers.
        Returns a `token` that must be used for guest access to the order.
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createSpreeClient } from '@spree/sdk'

          const client = createSpreeClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const cart = await client.store.cart.create()
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: false
        description: Bearer JWT token (optional - for authenticated customers)
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: false
        description: Unique key for request idempotency. Duplicate requests with the
          same key return the cached response.
        schema:
          type: string
      responses:
        '201':
          description: cart created with metadata
          content:
            application/json:
              example:
                id: or_UkLWZg9DAJ
                number: R423698003
                state: cart
                checkout_steps:
                - address
                - delivery
                - complete
                token: "-McWPHH7a9HPW6DVLgdIuA1772740654176"
                email:
                special_instructions:
                currency: USD
                locale: en
                item_count: 0
                state_lock_version: 0
                shipment_state:
                payment_state:
                item_total: '0.0'
                display_item_total: "$0.00"
                ship_total: '0.0'
                display_ship_total: "$0.00"
                adjustment_total: '0.0'
                display_adjustment_total: "$0.00"
                promo_total: '0.0'
                display_promo_total: "$0.00"
                tax_total: '0.0'
                display_tax_total: "$0.00"
                included_tax_total: '0.0'
                display_included_tax_total: "$0.00"
                additional_tax_total: '0.0'
                display_additional_tax_total: "$0.00"
                total: '0.0'
                display_total: "$0.00"
                completed_at:
                created_at: '2026-03-05T19:57:34.178Z'
                updated_at: '2026-03-05T19:57:34.178Z'
                order_promotions: []
                line_items: []
                shipments: []
                payments: []
                bill_address:
                ship_address:
                payment_methods: []
              schema:
                "$ref": "#/components/schemas/StoreOrder"
        '401':
          description: unauthorized - invalid API key
          content:
