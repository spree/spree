        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: address marked as default
          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                firstname: John
                lastname: Doe
                full_name: John Doe
                address1: 30 Lovely Street
                address2: Northwest
                city: Herndon
                zipcode: '35005'
                phone: 555-555-0199
                company: Company
                country_name: NAME_10
                country_iso: I10
                state_text: STATE_ABBR_28
                state_abbr: STATE_ABBR_28
                quick_checkout: false
                state_name: STATE_NAME_28
              schema:
                "$ref": "#/components/schemas/Address"
        '422':
          description: invalid kind parameter
          content:
            application/json:
              example:
                error:
                  code: invalid_request
                  message: kind must be billing or shipping
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: address not found
          content:
            application/json:
              example:
                error:
                  code: record_not_found
                  message: Address not found
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                  - billing
                  - shipping
                  example: billing
                  description: 'Address kind: billing or shipping'
              required:
              - kind
