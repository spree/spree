  "/api/v3/store/categories/{category_id}/products":
    get:
      summary: List products in a category
      tags:
      - Product Catalog
      security:
      - api_key: []
      description: Returns a paginated list of products belonging to the specified
        category
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const products = await client.categories.products.list('categories/clothing', {
            page: 1,
            limit: 25,
            sort: 'price',
            with_option_value_ids: ['optval_abc'],
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: category_id
        in: path
        required: true
        description: Category permalink or prefix ID
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: 'Number of items per page (default: 25, max: 100)'
        schema:
          type: integer
      - name: sort
        in: query
        required: false
        description: 'Sort order. Prefix with - for descending. Values: price, -price,
          best_selling, name, -name, -available_on, available_on'
