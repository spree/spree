---
openapi: 3.0.3
info:
  title: Store API
  contact:
    name: Spree Commerce
    url: https://spreecommerce.org
    email: hello@spreecommerce.org
  description: |
    Spree Store API v3 - Customer-facing storefront API for building headless commerce experiences.

    ## Authentication

    The Store API uses two authentication methods:

    ### API Key (Required)
    All requests must include a publishable API key in the `x-spree-api-key` header.

    ### JWT Bearer Token (For authenticated customers)
    After login, include the JWT token in the `Authorization: Bearer <token>` header.

    ### Order Token (For guest checkout)
    When creating an order, a `token` is returned. Include this in the `x-spree-token` header
    for guest access to that specific order.

    ## Response Format

    All responses are JSON. List endpoints return paginated responses with `data` and `meta` keys.

    ## Error Handling

    Errors return a consistent format:
    ```json
    {
      "error": {
        "code": "record_not_found",
        "message": "Product not found"
      }
    }
    ```
  version: v3
paths:
  "/api/v3/store/customer/addresses":
    get:
      summary: List customer addresses
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      description: Returns all addresses in the customer address book
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const addresses = await client.customer.addresses.list({}, {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: fields
        in: query
        required: false
        description: Comma-separated list of fields to include (e.g., name,slug,price).
          id is always included.
        schema:
          type: string
      responses:
        '200':
          description: addresses found
          content:
            application/json:
              example:
                data:
                - id: addr_EfhxLZ9ck8
                  firstname: John
                  lastname: Doe
                  full_name: John Doe
                  address1: 3 Lovely Street
                  address2: Northwest
                  city: Herndon
                  zipcode: '35005'
                  phone: 555-555-0199
                  company: Company
                  country_name: NAME_1
                  country_iso: I1
                  state_text: STATE_ABBR_1
                  state_abbr: STATE_ABBR_1
                  quick_checkout: false
                  state_name: STATE_NAME_1
                - id: addr_gbHJdmfrXB
                  firstname: John
                  lastname: Doe
                  full_name: John Doe
                  address1: 2 Lovely Street
                  address2: Northwest
                  city: Herndon
                  zipcode: '35005'
                  phone: 555-555-0199
                  company: Company
                  country_name: United States of America
                  country_iso: US
                  state_text: STATE_ABBR_3
                  state_abbr: STATE_ABBR_3
                  quick_checkout: false
                  state_name: STATE_NAME_3
                - id: addr_UkLWZg9DAJ
                  firstname: John
                  lastname: Doe
                  full_name: John Doe
                  address1: 1 Lovely Street
                  address2: Northwest
                  city: Herndon
                  zipcode: '35005'
                  phone: 555-555-0199
                  company: Company
                  country_name: United States of America
                  country_iso: US
                  state_text: STATE_ABBR_2
                  state_abbr: STATE_ABBR_2
                  quick_checkout: false
                  state_name: STATE_NAME_2
                meta:
                  page: 1
                  limit: 25
                  count: 3
                  pages: 1
                  from: 1
                  to: 3
                  in: 3
                  previous:
                  next:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Address"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthorized
          content:
            application/json:
              example:
                error:
                  code: authentication_required
                  message: Authentication required
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    post:
      summary: Create an address
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      description: Adds a new address to the customer address book
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const address = await client.customer.addresses.create({
            firstname: 'John',
            lastname: 'Doe',
            address1: '123 Main St',
            city: 'New York',
            zipcode: '10001',
            country_iso: 'US',
            state_abbr: 'NY',
            phone: '+1 555 123 4567',
          }, {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: address created
          content:
            application/json:
              example:
                id: addr_VqXmZF31wY
                firstname: John
                lastname: Doe
                full_name: John Doe
                address1: 123 Main St
                address2:
                city: New York
                zipcode: '10001'
                phone: "+1 555 123 4567"
                company:
                country_name: NAME_3
                country_iso: I3
                state_text: STATE_ABBR_7
                state_abbr: STATE_ABBR_7
                quick_checkout: false
                state_name: STATE_NAME_7
              schema:
                "$ref": "#/components/schemas/Address"
        '422':
          description: validation error
          content:
            application/json:
              example:
                error:
                  code: validation_error
                  message: First Name can't be blank, Last Name can't be blank, Address
                    can't be blank, City can't be blank, Country can't be blank, and
                    Zip Code can't be blank
                  details:
                    firstname:
                    - can't be blank
                    lastname:
                    - can't be blank
                    address1:
                    - can't be blank
                    city:
                    - can't be blank
                    country:
                    - can't be blank
                    zipcode:
                    - can't be blank
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstname:
                  type: string
                  example: John
                lastname:
                  type: string
                  example: Doe
                address1:
                  type: string
                  example: 123 Main St
                address2:
                  type: string
                  example: Apt 4B
                city:
                  type: string
                  example: New York
                zipcode:
                  type: string
                  example: '10001'
                phone:
                  type: string
                  example: "+1 555 123 4567"
                company:
                  type: string
                  example: Acme Inc
                country_iso:
                  type: string
                  example: US
                  description: ISO 3166-1 alpha-2 country code (e.g., "US", "DE")
                state_abbr:
                  type: string
                  example: NY
                  description: ISO 3166-2 subdivision code without country prefix
                    (e.g., "CA", "NY")
                state_name:
                  type: string
                  example: New York
                  description: State name - for countries without predefined states
              required:
              - firstname
              - lastname
              - address1
              - city
              - zipcode
              - country_iso
  "/api/v3/store/customer/addresses/{id}":
    get:
      summary: Get an address
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const address = await client.customer.addresses.get('addr_abc123', {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: fields
        in: query
        required: false
        description: Comma-separated list of fields to include (e.g., name,slug,price).
          id is always included.
        schema:
          type: string
      responses:
        '200':
          description: address found
          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                firstname: John
                lastname: Doe
                full_name: John Doe
                address1: 15 Lovely Street
                address2: Northwest
                city: Herndon
                zipcode: '35005'
                phone: 555-555-0199
                company: Company
                country_name: NAME_5
                country_iso: I5
                state_text: STATE_ABBR_13
                state_abbr: STATE_ABBR_13
                quick_checkout: false
                state_name: STATE_NAME_13
              schema:
                "$ref": "#/components/schemas/Address"
        '404':
          description: address not found
          content:
            application/json:
              example:
                error:
                  code: record_not_found
                  message: Address not found
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    patch:
      summary: Update an address
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const address = await client.customer.addresses.update('addr_abc123', {
            city: 'Los Angeles',
          }, {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: address updated
          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                firstname: John
                lastname: Doe
                full_name: John Doe
                address1: 21 Lovely Street
                address2: Northwest
                city: Los Angeles
                zipcode: '35005'
                phone: 555-555-0199
                company: Company
                country_name: NAME_7
                country_iso: I7
                state_text: STATE_ABBR_19
                state_abbr: STATE_ABBR_19
                quick_checkout: false
                state_name: STATE_NAME_19
              schema:
                "$ref": "#/components/schemas/Address"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstname:
                  type: string
                  example: John
                lastname:
                  type: string
                  example: Doe
                address1:
                  type: string
                  example: 456 Oak Ave
                city:
                  type: string
                  example: Los Angeles
    delete:
      summary: Delete an address
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          await client.customer.addresses.delete('addr_abc123', {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: address deleted
        '404':
          description: address not found
          content:
            application/json:
              example:
                error:
                  code: record_not_found
                  message: Address not found
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/api/v3/store/customer/addresses/{id}/mark_as_default":
    patch:
      summary: Mark address as default
      tags:
      - Customers
      security:
      - api_key: []
        bearer_auth: []
      description: Sets the address as the default billing or shipping address for
        the customer
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const address = await client.customer.addresses.markAsDefault('addr_abc123', 'billing', {
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: address marked as default
          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                firstname: John
                lastname: Doe
                full_name: John Doe
                address1: 30 Lovely Street
                address2: Northwest
                city: Herndon
                zipcode: '35005'
                phone: 555-555-0199
                company: Company
                country_name: NAME_10
                country_iso: I10
                state_text: STATE_ABBR_28
                state_abbr: STATE_ABBR_28
                quick_checkout: false
                state_name: STATE_NAME_28
              schema:
                "$ref": "#/components/schemas/Address"
        '422':
          description: invalid kind parameter
          content:
            application/json:
              example:
                error:
                  code: invalid_request
                  message: kind must be billing or shipping
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: address not found
          content:
            application/json:
              example:
                error:
                  code: record_not_found
                  message: Address not found
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  type: string
                  enum:
                  - billing
                  - shipping
                  example: billing
                  description: 'Address kind: billing or shipping'
              required:
              - kind
  "/api/v3/store/auth/login":
    post:
      summary: Login
      tags:
      - Authentication
      security:
      - api_key: []
      description: Authenticates a customer with email/password and returns a JWT
        token
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const auth = await client.auth.login({
            email: 'customer@example.com',
            password: 'password123',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: login successful
          content:
            application/json:
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJ1c2VyX3R5cGUiOiJjdXN0b21lciIsImp0aSI6ImNkN2QyY2FhLTkyOWQtNDkzYS05NTQ0LTgwZDMyYTc0YmRjZSIsImlzcyI6InNwcmVlIiwiYXVkIjoic3RvcmVfYXBpIiwiZXhwIjoxNzczMjYzNzY5fQ.ziT9ugb9kC8vLE8q41j5UM9vJb_dMea0feoumRqgBgA
                user:
                  id: cus_UkLWZg9DAJ
                  email: test@example.com
                  first_name: Mallory
                  last_name: Schmitt
                  phone:
                  accepts_email_marketing: false
                  created_at: '2026-03-11T20:16:08.948Z'
                  updated_at: '2026-03-11T20:16:08.948Z'
                  addresses: []
                  default_billing_address:
                  default_shipping_address:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '401':
          description: missing API key
          content:
            application/json:
              example:
                error:
                  code: invalid_token
                  message: Valid API key required
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  example: email
                  description: 'Authentication provider (default: email)'
                email:
                  type: string
                  format: email
                  example: customer@example.com
                password:
                  type: string
                  example: password123
              required:
              - email
              - password
  "/api/v3/store/auth/refresh":
    post:
      summary: Refresh token
      tags:
      - Authentication
      security:
      - api_key: []
        bearer_auth: []
      description: Generates a new JWT token for the authenticated user
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const auth = await client.auth.refresh({
            bearerToken: '<token>',
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      responses:
        '200':
          description: token refreshed
          content:
            application/json:
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJ1c2VyX3R5cGUiOiJjdXN0b21lciIsImp0aSI6IjY4MTg5MjBmLTM5ODYtNDdiYy04NjE1LWUxMDBhMDFjYmMwNyIsImlzcyI6InNwcmVlIiwiYXVkIjoic3RvcmVfYXBpIiwiZXhwIjoxNzczMjYzNzcwfQ.QAFfl9n0ftXwpVd8NcRfD7pg39I8Eo7jibXguYer7vk
                user:
                  id: cus_UkLWZg9DAJ
                  email: test@example.com
                  first_name: Loma
                  last_name: Hickle
                  phone:
                  accepts_email_marketing: false
                  created_at: '2026-03-11T20:16:10.379Z'
                  updated_at: '2026-03-11T20:16:10.379Z'
                  addresses: []
                  default_billing_address:
                  default_shipping_address:
              schema:
                "$ref": "#/components/schemas/AuthResponse"
        '401':
          description: missing or invalid token
          content:
            application/json:
              example:
                error:
                  code: authentication_required
                  message: Authentication required
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/api/v3/store/cart":
    post:
      summary: Create a new cart
      tags:
      - Cart
      security:
      - api_key: []
      description: |
        Creates a new shopping cart. Can be created by guests or authenticated customers.
        Returns a `token` that must be used for guest access to the cart.
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          // Create an empty cart
          const cart = await client.cart.create()

          // Create a cart with line items
          const cartWithItems = await client.cart.create({
            line_items: [
              { variant_id: 'variant_abc123', quantity: 2 },
            ],
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        required: false
        description: Bearer JWT token (optional - for authenticated customers)
        schema:
          type: string
      - name: Idempotency-Key
        in: header
        required: false
        description: Unique key for request idempotency. Duplicate requests with the
          same key return the cached response.
        schema:
          type: string
      responses:
        '201':
          description: cart created with metadata
          content:
            application/json:
              example:
                id: cart_UkLWZg9DAJ
                number: R234338485
                state: cart
                checkout_steps:
                - address
                - delivery
                - complete
                token: 1WFmOSYStXOjNKWBoA9RTg1773260171159
                email:
                special_instructions:
                currency: USD
                locale: en
                item_count: 0
                state_lock_version: 0
                item_total: '0.0'
                display_item_total: "$0.00"
                ship_total: '0.0'
                display_ship_total: "$0.00"
                adjustment_total: '0.0'
                display_adjustment_total: "$0.00"
                promo_total: '0.0'
                display_promo_total: "$0.00"
                tax_total: '0.0'
                display_tax_total: "$0.00"
                included_tax_total: '0.0'
                display_included_tax_total: "$0.00"
                additional_tax_total: '0.0'
                display_additional_tax_total: "$0.00"
                total: '0.0'
                display_total: "$0.00"
                created_at: '2026-03-11T20:16:11.160Z'
                updated_at: '2026-03-11T20:16:11.160Z'
                order_promotions: []
                line_items: []
                shipments: []
                payments: []
                bill_address:
                ship_address:
                payment_methods: []
              schema:
                "$ref": "#/components/schemas/Cart"
        '401':
          description: unauthorized - invalid API key
          content:
            application/json:
              example:
                error:
                  code: invalid_token
                  message: Valid API key required
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '400':
          description: idempotency key too long
          content:
            application/json:
              example:
                error:
                  code: invalid_request
                  message: Idempotency-Key must be 255 characters or less.
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '422':
          description: idempotency key reused with different parameters
          content:
            application/json:
              example:
                error:
                  code: idempotency_key_reused
                  message: This Idempotency-Key has already been used with different
                    request parameters.
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  description: Write-only key-value metadata (Stripe-style). Not returned
                    in responses.
                line_items:
                  type: array
                  description: Line items to add to the cart on creation
                  items:
                    type: object
                    properties:
                      variant_id:
                        type: string
                        example: variant_abc123
                        description: Prefixed variant ID
                      quantity:
                        type: integer
                        example: 2
                        description: Quantity (defaults to 1)
                      metadata:
                        type: object
                        additionalProperties: true
                        description: Arbitrary key-value metadata
                    required:
                    - variant_id
    get:
      summary: Get current cart
      tags:
      - Cart
      security:
      - api_key: []
        bearer_auth: []
      description: |
        Returns the current shopping cart (incomplete order).
        Authenticate via JWT token for logged-in users or via x-spree-token header for guests.
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createClient } from '@spree/sdk'

          const client = createClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          // Authenticated customer
          const cart = await client.cart.get({
            bearerToken: '<token>',
          })

          // Guest with order token
          const guestCart = await client.cart.get({
            orderToken: 'ORDER_TOKEN',
          })
      parameters:
      - name: x-spree-api-key
        in: header
