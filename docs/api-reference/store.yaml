    get:
      summary: List products in a taxon
      tags:
      - Product Catalog
      security:
      - api_key: []
      description: Returns a paginated list of products belonging to the specified
        taxon
      x-codeSamples:
      - lang: javascript
        label: Spree SDK
        source: |-
          import { createSpreeClient } from '@spree/sdk'

          const client = createSpreeClient({
            baseUrl: 'https://your-store.com',
            publishableKey: '<api-key>',
          })

          const products = await client.store.taxons.products.list('categories/clothing', {
            page: 1,
            limit: 25,
            sort: 'price asc',
            with_option_value_ids: ['optval_abc'],
          })
      parameters:
      - name: x-spree-api-key
        in: header
        required: true
        schema:
          type: string
      - name: taxon_id
        in: path
        required: true
        description: Taxon permalink or prefix ID
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: 'Number of items per page (default: 25, max: 100)'
        schema:
          type: integer
      - name: sort
        in: query
        required: false
        description: 'Sort order. Values: price asc, price desc, best_selling, name
          asc, name desc, available_on desc, available_on asc'
