          content:
            application/json:
              example:
                id: addr_EfhxLZ9ck8
                firstname: John
                lastname: Doe
                full_name: John Doe
                address1: 21 Lovely Street
                address2: Northwest
                city: Los Angeles
                zipcode: '35005'
                phone: 555-555-0199
