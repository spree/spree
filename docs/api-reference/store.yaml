servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
tags:
- name: Authentication
  description: Customer authentication and registration
- name: Store
  description: Store information and settings
- name: Product Catalog
  description: Products, taxonomies, and categories
- name: Internationalization
  description: Countries, currencies, and locales available in the store
- name: Cart
  description: Shopping cart management
- name: Checkout
  description: Checkout flow and order updates
- name: Orders
  description: Order lookup
- name: Customers
  description: Customer account, addresses, saved payment methods, and order history
- name: Wishlists
  description: Customer wishlists
- name: Digitals
  description: Digital product downloads
- name: Markets
  description: Market information and resolution
x-tagGroups:
- name: Store
  tags:
  - Store
  - Internationalization
  - Markets
- name: Catalog
  tags:
  - Product Catalog
- name: Cart
  tags:
  - Cart
- name: Checkout
  tags:
  - Checkout
- name: Orders
  tags:
  - Orders
- name: Customer
  tags:
  - Authentication
  - Customers
  - Wishlists
  - Digitals
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: x-spree-api-key
      in: header
      description: Publishable API key for store access
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authenticated customers
  schemas:
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 25
        count:
          type: integer
          example: 100
          description: Total number of records
        pages:
          type: integer
          example: 4
          description: Total number of pages
        from:
          type: integer
          example: 1
          description: Index of first record on this page
        to:
          type: integer
          example: 25
          description: Index of last record on this page
        in:
          type: integer
          example: 25
          description: Number of records on this page
        previous:
          type: integer
          nullable: true
          example:
          description: Previous page number
        next:
          type: integer
          nullable: true
          example: 2
          description: Next page number
      required:
      - page
      - limit
      - count
      - pages
      - from
      - to
      - in
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: record_not_found
            message:
              type: string
