name: Release

on:
  push:
    tags: ['v*']

jobs:
  release-gems:
    name: Release gems to RubyGems
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: spree

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Build and push gems to RubyGems
        working-directory: spree
        run: bundle exec rake gem:release
