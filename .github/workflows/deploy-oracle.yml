name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
      - claude/spree-fork-audits-review-4uj976
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/spree-backend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-url: ${{ steps.image.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Set image URL output
        id: image
        run: echo "url=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Oracle Cloud
        env:
          SSH_KEY: ~/.ssh/oracle_key
          ORACLE_USER: ubuntu
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          ssh -i $SSH_KEY $ORACLE_USER@$ORACLE_HOST << 'DEPLOY_EOF'
          set -e

          # First run on a fresh VPS: repo isn't cloned yet
          if [ ! -d ~/sklepik/.git ]; then
            git clone https://github.com/pawelekbyra/sklepik.git ~/sklepik
          fi
          cd ~/sklepik

          # Pull latest code
          git fetch origin
          git checkout main
          git reset --hard origin/main

          # First run: generate .env and a self-signed cert so compose can start.
          # Replace ssl/cert.pem with a real Let's Encrypt cert once there's a domain.
          if [ ! -f .env ]; then
            cp .env.example .env
            sed -i "s#^POSTGRES_PASSWORD=.*#POSTGRES_PASSWORD=$(openssl rand -hex 24)#" .env
            sed -i "s#^SECRET_KEY_BASE=.*#SECRET_KEY_BASE=$(openssl rand -hex 64)#" .env
          fi
          mkdir -p ssl
          if [ ! -f ssl/cert.pem ]; then
            openssl req -x509 -newkey rsa:4096 -keyout ssl/key.pem -out ssl/cert.pem \
              -days 365 -nodes -subj "/CN=localhost"
          fi

          # Build the fork's image directly on the VPS (image built by the
          # `build` job above is only a CI fail-fast gate — GHCR auth isn't
          # set up here, so this box builds its own copy instead of pulling).
          docker-compose build web sidekiq
          docker-compose up -d postgres redis
          sleep 5
          docker-compose up -d --no-deps web sidekiq nginx
          sleep 10

          # Copy engine migrations into the host app, then migrate
          docker-compose exec -T web bundle exec rake spree:install:migrations
          docker-compose exec -T web bundle exec rake db:migrate
          docker-compose exec -T web bundle exec rake spree:role_users:backfill_store_ids

          # Precompile assets
          docker-compose exec -T web bundle exec rake assets:precompile

          # Clear cache if needed
          docker-compose exec -T web bundle exec rake cache:clear

          # Health check
          sleep 5
          curl -f http://localhost:3000/up || exit 1

          echo "✓ Deployment successful"
          DEPLOY_EOF

      - name: Notify Slack (optional)
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✓ Deploy to Oracle Cloud successful"
          else
            echo "✗ Deploy to Oracle Cloud failed"
          fi
