name: Tests

on:
  push:
    branches: [main, '*-stable']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect whether this push/PR touches Ruby. Downstream jobs gate on this
  # output instead of a workflow-level `paths:` filter, so the workflow always
  # runs and the `Ruby CI` gate is always reported to branch protection.
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      ruby: ${{ steps.filter.outputs.ruby }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ruby:
              - 'spree/**'
              - '.github/workflows/tests.yml'

  build-postgres:
    name: "Build (PostgreSQL)"
    needs: changes
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    env:
      DB: postgres
      RAILS_VERSION: "~> 8.1.0"
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-ruby4.0-postgres-${{ hashFiles('spree/**/*.gemspec', 'spree/**/Gemfile') }}
          restore-keys: |
            gems-${{ runner.os }}-ruby4.0-postgres-

      - name: Install libvips
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libvips42t64
          version: 1

      - name: Install root dependencies
        working-directory: spree
        run: |
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install

      - name: Install all project dependencies
        run: |
          for project in core api admin emails; do
            echo "--- Installing gems for $project ---"
            cd spree/$project
            bundle config set --local path ${{ github.workspace }}/vendor/bundle
            bundle install
            cd ${{ github.workspace }}
          done

  build-mysql:
    name: "Build (MySQL)"
    needs: changes
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    env:
      DB: mysql
      RAILS_VERSION: "7.2.0"
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-ruby4.0-mysql-${{ hashFiles('spree/**/*.gemspec', 'spree/**/Gemfile') }}
          restore-keys: |
            gems-${{ runner.os }}-ruby4.0-mysql-

      - name: Install libvips
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libvips42t64
          version: 1

      - name: Install root dependencies
        working-directory: spree
        run: |
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install

      - name: Install all project dependencies
        run: |
          for project in core api admin emails; do
            echo "--- Installing gems for $project ---"
            cd spree/$project
            bundle config set --local path ${{ github.workspace }}/vendor/bundle
            bundle install
            cd ${{ github.workspace }}
          done

  test-postgres:
    name: "PostgreSQL - ${{ matrix.project }} (${{ matrix.shard }}/${{ matrix.total_shards }})"
    needs: [changes, build-postgres]
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each runner runs PROCS rspec processes in parallel (ubuntu-latest has
        # 4 vCPUs), so total parallelism is total_shards × procs. The suite is
        # split into runtime-weighted groups across that product, replacing the
        # old filename round-robin (which left core ~1.9x imbalanced).
        include:
          # core: 3 runners × 4 procs = 12-way
          - { project: core, shard: 1, total_shards: 3, procs: 4 }
          - { project: core, shard: 2, total_shards: 3, procs: 4 }
          - { project: core, shard: 3, total_shards: 3, procs: 4 }
          # api: 1 runner × 4 procs
          - { project: api, shard: 1, total_shards: 1, procs: 4 }
          # admin: 1 runner × 4 procs (feature specs are browser-driven; keep modest)
          - { project: admin, shard: 1, total_shards: 1, procs: 4 }
          # emails: 1 runner × 2 procs (tiny suite)
          - { project: emails, shard: 1, total_shards: 1, procs: 2 }
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:latest
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -f http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB: postgres
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MEILISEARCH_URL: http://localhost:7700
      RAILS_VERSION: "~> 8.1.0"
      CI_ARTIFACTS: /tmp/test-artifacts
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
      # Coverage rides the PostgreSQL run (the suite already executes here) so it
      # doesn't require a separate full pass. Each parallel process gets its own
      # report dir, keyed by shard + TEST_ENV_NUMBER (see spec_helper).
      COVERAGE: true
      COVERAGE_DIR: ${{ github.workspace }}/coverage
      CI_SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - name: Restore gem cache
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-ruby4.0-postgres-${{ hashFiles('spree/**/*.gemspec', 'spree/**/Gemfile') }}
          restore-keys: |
            gems-${{ runner.os }}-ruby4.0-postgres-

      - name: Install libvips
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libvips42t64
          version: 1

      - name: Install dependencies
        run: |
          cd spree
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install
          cd ${{ matrix.project }}
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install

      - name: Setup test app
        working-directory: spree/${{ matrix.project }}
        run: |
          if [[ "${{ matrix.project }}" == "core" || "${{ matrix.project }}" == "api" ]]; then
            bundle exec --gemfile=${{ github.workspace }}/spree/Gemfile rake test_app
          else
            bundle exec rake test_app
          fi

      - name: Setup parallel databases
        working-directory: spree/${{ matrix.project }}
        run: bundle exec rake parallel_setup[${{ matrix.procs }}]

      - name: Run tests
        working-directory: spree/${{ matrix.project }}
        env:
          SHARD: ${{ matrix.shard }}
          TOTAL_SHARDS: ${{ matrix.total_shards }}
          PROCS: ${{ matrix.procs }}
          RSPEC_OPTS: >-
            --order random
            --format progress
            -r rspec_junit_formatter
            --format RspecJunitFormatter
            -o ${{ github.workspace }}/tmp/test-results/rspec/${{ matrix.project }}-${{ matrix.shard }}-$TEST_ENV_NUMBER.xml
        run: |
          mkdir -p ${{ github.workspace }}/tmp/test-results/rspec
          bundle exec rake parallel_shard

      - name: Upload coverage to Codecov
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ github.workspace }}/coverage
          flags: ${{ matrix.project }}
          name: ${{ matrix.project }}-shard-${{ matrix.shard }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-postgres-${{ matrix.project }}-${{ matrix.shard }}
          path: tmp/test-results/
          if-no-files-found: ignore

      - name: Upload failed test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-screenshots-postgres-${{ matrix.project }}-${{ matrix.shard }}
          path: /tmp/test-artifacts/
          if-no-files-found: ignore

  test-mysql:
    name: "MySQL - ${{ matrix.project }} (${{ matrix.shard }}/${{ matrix.total_shards }})"
    needs: [changes, build-mysql]
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # See test-postgres for the runtime-balanced grouping model.
        include:
          # core: 3 runners × 4 procs = 12-way
          - { project: core, shard: 1, total_shards: 3, procs: 4 }
          - { project: core, shard: 2, total_shards: 3, procs: 4 }
          - { project: core, shard: 3, total_shards: 3, procs: 4 }
          # api: 1 runner × 4 procs
          - { project: api, shard: 1, total_shards: 1, procs: 4 }
          # admin: 1 runner × 4 procs
          - { project: admin, shard: 1, total_shards: 1, procs: 4 }
          # emails: 1 runner × 2 procs
          - { project: emails, shard: 1, total_shards: 1, procs: 2 }
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB: mysql
      DB_HOST: 127.0.0.1
      DB_USERNAME: root
      DB_PASSWORD: password
      RAILS_VERSION: "7.2.0"
      CI_ARTIFACTS: /tmp/test-artifacts
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - name: Restore gem cache
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-ruby4.0-mysql-${{ hashFiles('spree/**/*.gemspec', 'spree/**/Gemfile') }}
          restore-keys: |
            gems-${{ runner.os }}-ruby4.0-mysql-

      - name: Install libvips
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libvips42t64
          version: 1

      - name: Install dependencies
        run: |
          cd spree
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install
          cd ${{ matrix.project }}
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install

      - name: Setup test app
        working-directory: spree/${{ matrix.project }}
        run: |
          if [[ "${{ matrix.project }}" == "core" || "${{ matrix.project }}" == "api" ]]; then
            bundle exec --gemfile=${{ github.workspace }}/spree/Gemfile rake test_app
          else
            bundle exec rake test_app
          fi

      - name: Setup parallel databases
        working-directory: spree/${{ matrix.project }}
        run: bundle exec rake parallel_setup[${{ matrix.procs }}]

      - name: Run tests
        working-directory: spree/${{ matrix.project }}
        env:
          SHARD: ${{ matrix.shard }}
          TOTAL_SHARDS: ${{ matrix.total_shards }}
          PROCS: ${{ matrix.procs }}
          RSPEC_OPTS: >-
            --order random
            --format progress
            -r rspec_junit_formatter
            --format RspecJunitFormatter
            -o ${{ github.workspace }}/tmp/test-results/rspec/${{ matrix.project }}-${{ matrix.shard }}-$TEST_ENV_NUMBER.xml
        run: |
          mkdir -p ${{ github.workspace }}/tmp/test-results/rspec
          bundle exec rake parallel_shard

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-mysql-${{ matrix.project }}-${{ matrix.shard }}
          path: tmp/test-results/
          if-no-files-found: ignore

      - name: Upload failed test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-screenshots-mysql-${{ matrix.project }}-${{ matrix.shard }}
          path: /tmp/test-artifacts/
          if-no-files-found: ignore

  brakeman:
    name: Brakeman
    needs: [changes, build-postgres]
    if: needs.changes.outputs.ruby == 'true'
    runs-on: ubuntu-latest
    env:
      DB: postgres
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - name: Restore gem cache
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-ruby4.0-postgres-${{ hashFiles('spree/**/*.gemspec', 'spree/**/Gemfile') }}
          restore-keys: |
            gems-${{ runner.os }}-ruby4.0-postgres-

      - name: Install dependencies
        working-directory: spree
        run: |
          bundle config set --local path ${{ github.workspace }}/vendor/bundle
          bundle install

      - name: Run Brakeman
        working-directory: spree
        run: |
          for project in core api admin; do
            echo "--- Running Brakeman on $project ---"
            bundle exec brakeman --ensure-latest -p $project
          done

      - name: Upload Brakeman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-reports
          path: spree/brakeman-*.*
          if-no-files-found: ignore

  # Single stable status check for branch protection. Always runs, rolls up the
  # real jobs, and passes when they succeed OR are skipped (non-Ruby PRs). Mark
  # ONLY this check ("Ruby CI") as required — never the granular matrix legs.
  ruby-ci:
    name: Ruby CI
    if: always()
    needs: [changes, build-postgres, build-mysql, test-postgres, test-mysql, brakeman]
    runs-on: ubuntu-latest
    steps:
      - name: Roll up required Ruby checks
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: build-postgres, build-mysql, test-postgres, test-mysql, brakeman
