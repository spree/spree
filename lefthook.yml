pre-commit:
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,mjs,cjs,mts,cts,json,jsonc}"
      stage_fixed: true
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typelizer-and-zod:
      glob: "spree/api/app/serializers/**/*.rb"
      run: |
        echo "Serializer changes detected — regenerating TypeScript types and Zod schemas..."
        cd spree/api && bundle exec rake typelizer:generate && cd ../..
        cd packages/sdk && pnpm generate:zod && cd ../..
        git add packages/sdk/src/types/generated/ packages/sdk/src/zod/generated/
        git add packages/admin-sdk/src/types/generated/

pre-push:
  commands:
    biome-ci:
      # No glob filter: biome ci scopes itself via --changed --since=main to
      # validate the whole branch diff vs main. A glob would skip the check
      # whenever a push touched zero TS files (e.g. Ruby-only follow-up push),
      # missing TS issues from earlier commits already in the branch.
      run: pnpm exec biome ci --changed --since=main --no-errors-on-unmatched --files-ignore-unknown=true
